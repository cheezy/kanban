name: Elixir CD

# Define workflow that runs when changes are pushed to the
# `main` branch or pushed to a PR branch that targets the `main`
# branch. 
on:
  push:
    branches: [ "main", "release" ]  # adapt branch for project
  pull_request:
    branches: [ "main" ]  # adapt branch for project

# Sets the ENV `MIX_ENV` to `test` for running tests
env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  test:
    # Set up a Postgres DB service. By default, Phoenix applications
    # use Postgres. This creates a database for running tests.
    # Additional services can be defined here if required.
    services:
      db:
        image: postgres:16
        ports: ['5432:5432']
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    runs-on: ubuntu-latest
    name: Continuous Integration
    strategy:
      # Specify the OTP and Elixir versions to use when building
      # and running the workflow steps.
      matrix:
        otp: ['28.5.0.2']       # Define the OTP version [required]
        elixir: ['1.20.2']    # Define the elixir version [required]

    steps:

      # Step: Setup Elixir + Erlang image as the base.
    - name: Set up Elixir
      uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
      with:
        otp-version: ${{matrix.otp}}
        elixir-version: ${{matrix.elixir}}
      
    # Step: Check out the code.
    - name: Checkout code
      uses: actions/checkout@v7

    # Step: Install Chrome for ChromicPDF (PDF generation tests)
    - name: Install Chrome
      uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2

    # Step: Define how to cache deps. Restores existing cache if present.
    - name: Cache deps
      id: cache-deps
      uses: actions/cache@v6
      env:
        cache-name: cache-elixir-deps
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.cache-name }}-

    # Step: Define how to cache the `_build` directory. After the first run,
    # this speeds up tests runs a lot. This includes not re-compiling our
    # project's downloaded deps every run.
    - name: Cache compiled build
      id: cache-build
      uses: actions/cache@v6
      env:
        cache-name: cache-compiled-build
      with:
        path: _build
        key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.cache-name }}-
          ${{ runner.os }}-mix-

    # Step: Conditionally bust the cache when job is re-run.
    # Sometimes, we may have issues with incremental builds that are fixed by
    # doing a full recompile. In order to not waste dev time on such trivial
    # issues (while also reaping the time savings of incremental builds for
    # *most* day-to-day development), force a full recompile only on builds
    # that are retried.
    - name: Clean to rule out incremental build as a source of flakiness
      if: github.run_attempt != '1'
      run: |
        mix deps.clean --all
        mix clean
      shell: sh

    # Step: Download project dependencies. If unchanged, uses
    # the cached version.
    - name: Install dependencies
      run: mix deps.get

    # Step: Compile the project treating any warnings as errors.
    # Customize this step if a different behavior is desired.
    - name: Compiles without warnings
      run: mix compile --warnings-as-errors

    # Step: Check that the checked in code has already been formatted.
    - name: Check Formatting
      run: mix format --check-formatted --no-exit

    # Step: Run audit on dependencies
    - name: Run Audit Security Vulnerabilities and Retired Packages
      run: |
        mix deps.audit
        mix hex.audit

    # Step: Execute the tests with coverage
    - name: Run Tests
      run: mix test --cover

    # Step: Security Analysis
    - name: Run Sobelow Security Analysis
      run: mix sobelow --config .sobelow-conf

    # Step: Static Analysis
    - name: Run Static Code Analysis
      run: mix credo --strict

  deploy-review:
    name: Deploy to Review Environment
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    concurrency: review-deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # v1.6
      - run: flyctl deploy --remote-only --config ./fly.review.toml --dockerfile ./Dockerfile.review
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      
  deploy-prod:
    name: Deploy to Production Environment
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/release'
    concurrency: prod-deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # v1.6
      - run: flyctl deploy --remote-only --config ./fly.production.toml --dockerfile ./Dockerfile.production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      